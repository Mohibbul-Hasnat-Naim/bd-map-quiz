<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Map Quiz</title>
    <link rel="stylesheet" href="../css/worldMapQuiz.css">
    <link rel="stylesheet" href="../css/preloading bar.css">
</head>
<body>
    <div id="result-modal" class="result-modal">
        <div class="result-card">
            <h2>QUIZ COMPLETED</h2>

            <div class="result-line">
                Time: <span id="final-time">00:00</span>
            </div>

            <div class="result-line">
                Correct: <span id="final-correct">0</span>
            </div>

            <div class="result-line">
                Attempts: <span id="final-attempts">0</span>
            </div>

            <div class="result-line">
                Skipped: <span id="final-skipped">0</span>
            </div>

            <div class="result-line">
                Accuracy: <span id="final-accuracy">0%</span>
            </div>

            <div class="btn-group" style="justify-content:center; margin-top:20px;">
                <button class="btn-learn" style="background: rgb(30, 245, 48); display: block;" onclick="resetGame()">Play Again</button>
                <button class="btn-back" style="background: rgb(1, 211, 248); display:block;" onclick="toggleMode(true)">Learn Map</button>
            </div>
        </div>
    </div>

    <div class="hud-top">
        <div class="card">
            <small style="color:#0004fd">FIND THE COUNTRY</small>
            <span id="target-name">...</span>
            <div id="status-msg">Correct!</div>
        </div>

        <div class="card stats-area">
            <div class="stats-row">
                <span>Score: </span>
                <b id="score">0/0</b>
            </div>

            <div class="stats-row">
                <span>Attempts: </span>
                <b id="attempts">0</b>
            </div>

            <div class="stats-row">
                <span>Time: </span>
                <b id="live-timer">00:00</b>
            </div>
        </div>
    </div>

    <div class="hud-vertical">
        <select id="map-selector" onchange="changeMap(this.value)">
            <!-- <option value="contents">Continents</option> -->
            <option value="world">World</option>
            <option value="asia">Asia</option>
            <option value="europe">Europe</option>
            <option value="africa">Africa</option>
            <option value="northAmerica">North America</option>
            <option value="southAmerica">South America</option>
            <option value="oceania">Oceania</option>
        </select>
        <button class="btn-restart" onclick="resetGame()">Restart</button>
        <button class="btn-skip" onclick="skipQuestion()">Skip</button>        
    </div>

    <div class="hud-horizontal">
        <button class="btn-sound" id="sound-toggle" onclick="toggleSound()">🔊 Sound ON</button>
        <button class="btn-label" id="label-toggle" onclick="toggleLabels()">🏷 Labels OFF</button>
        <button class="btn-learn" id="mode-btn" onclick="toggleMode(true)">Learn Map</button>
        <button class="btn-home" 
        onclick="window.location.href='../index.html'">
            Home
        </button>
    </div>

    <div class="map-viewport" id="map-viewport">
        <svg
            viewBox="0 0 2000 857"
            xmlns="http://www.w3.org/2000/svg"
            id="main-svg"
        >
            <g id="map-layer"></g>
        </svg>
    </div>
</body>

    <script type="module">
        import { initLoader } from '../config/preloading bar.js';
        initLoader();
    </script>    

    <script>
        window.changeMap = function(mapName) {
            window.location.href = `worldMapQuiz.html?map=${mapName}`;
        };
    </script>

    <script src="https://d3js.org/d3.v7.min.js"></script>

    <script type="module">
        import { startQuiz } from "../engine/quizEngine.js";
        import {
            getWorldMap,
            getAsiaMap,
            getEuropeMap,
            getAfricaMap,
            getNorthAmericaMap,
            getSouthAmericaMap,
            getOceaniaMap
        } from "../maps/worldMapQuiz.js";


        const params = new URLSearchParams(window.location.search);
        const selectedMap = params.get("map") || "world";
        document.getElementById("map-selector").value = selectedMap;

        const mapFunctions = {
            world: getWorldMap,
            asia: getAsiaMap,
            europe: getEuropeMap,
            africa: getAfricaMap,
            northAmerica: getNorthAmericaMap,
            southAmerica: getSouthAmericaMap,
            oceania: getOceaniaMap
        };

        const mapProvider =
        mapFunctions[selectedMap] || getWorldMap;

        startQuiz({
            mapDataProvider: mapProvider,
            sounds: {
                correct: new Audio("../sounds/correct.mp3"),
                wrong: new Audio("../sounds/wrong.mp3"),
                skip: new Audio("../sounds/skip.mp3"),
                victory: new Audio("../sounds/victory.mp3"),
                mode: new Audio("../sounds/mode.mp3")
            }
        });
    </script>
</html>
